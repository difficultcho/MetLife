services:
  server:
    build: ./server
    container_name: metlife-server
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./server/.env
    volumes:
      - ./server/static:/app/static
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    container_name: metlife-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-metlife123}
      MYSQL_DATABASE: metlife
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
