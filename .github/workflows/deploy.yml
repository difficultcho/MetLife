name: Deploy to Server

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - 'docker-compose.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: bce.kkmsee.com
          username: ${{ secrets.CVM_USERNAME }}
          key: ${{ secrets.CVM_SSH_KEY }}
          script: |
            # 首次部署：clone 仓库
            if [ ! -d /opt/metlife ]; then
              sudo git clone https://github.com/difficultcho/MetLife.git /opt/metlife
            fi

            cd /opt/metlife
            sudo git pull origin main

            # 首次部署：创建 .env
            if [ ! -f server/.env ]; then
              sudo cp server/.env.example server/.env
              echo "⚠️ 请手动编辑 /opt/metlife/server/.env 填入实际配置"
            fi

            # 构建并启动
            sudo docker compose up -d --build server
            sudo docker image prune -f
