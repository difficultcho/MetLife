name: Deploy to Server

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - 'docker-compose.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: bce.kkmsee.com
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /opt/metlife
            git pull origin main
            docker compose up -d --build server
            docker image prune -f
